services:
  - type: web
    name: lumen-studio
    env: node
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: COMFYUI_URL
        value: https://spark-comfyui.ngrok.app
      - key: COMFYUI_AUTH
        value: lumen:studio2026
